name: CLI

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'scripts/**'
      - '.github/workflows/cli.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - 'scripts/**'
      - '.github/workflows/cli.yml'
  release:
    types: [published]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: ${{ runner.os }}-deno-${{ hashFiles('**/deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-deno-

      - name: Run lint
        run: deno lint
      # - name: Run tests
      #   run: deno task test:all

  build-verify:
    name: Build Verify (Linux)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Set test environment
        run: |
          echo "OAUTH_DOMAIN=test.clerk.accounts.dev" >> $GITHUB_ENV
          echo "OAUTH_CLIENT_ID=test_client_id" >> $GITHUB_ENV
          echo "API_ENDPOINT=http://localhost:8080" >> $GITHUB_ENV
          echo "DASHBOARD_URL=http://localhost:3000" >> $GITHUB_ENV
          echo "OAUTH_REDIRECT_URI=http://localhost:8918/callback" >> $GITHUB_ENV
          echo "OAUTH_SCOPES=profile email openid" >> $GITHUB_ENV
          echo "OAUTH_TYPE=${{ vars.OAUTH_TYPE }}" >> $GITHUB_ENV

      - name: Build binary
        shell: bash
        env:
          DENO_TARGET: x86_64-unknown-linux-gnu
          DENO_OUTPUT: dist/monid-verify
        run: deno task cli:build:ci

      - name: Test binary
        run: dist/monid-verify --version

  build-nightly:
    name: Build Nightly (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    strategy:
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            output: monid-nightly-linux-x64
          - platform: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            output: monid-nightly-macos-arm64
          - platform: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            output: monid-nightly-windows-x64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Extract version info
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=nightly-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Version: nightly-${SHORT_SHA}"
        shell: bash

      - name: Set environment variables
        run: |
          echo "VERSION=${{ steps.version.outputs.version }}" >> $GITHUB_ENV
          echo "OAUTH_DOMAIN=${{ vars.OAUTH_DOMAIN }}" >> $GITHUB_ENV
          echo "OAUTH_CLIENT_ID=${{ vars.OAUTH_CLIENT_ID }}" >> $GITHUB_ENV
          echo "API_ENDPOINT=${{ vars.API_ENDPOINT }}" >> $GITHUB_ENV
          echo "DASHBOARD_URL=${{ vars.DASHBOARD_URL }}" >> $GITHUB_ENV
          echo "OAUTH_REDIRECT_URI=${{ vars.OAUTH_REDIRECT_URI }}" >> $GITHUB_ENV
          echo "OAUTH_SCOPES=${{ vars.OAUTH_SCOPES }}" >> $GITHUB_ENV
          echo "OAUTH_TYPE=${{ vars.OAUTH_TYPE }}" >> $GITHUB_ENV
        shell: bash

      - name: Generate config
        run: deno task config:gen

      - name: Build binary
        shell: bash
        env:
          DENO_TARGET: ${{ matrix.target }}
          DENO_OUTPUT: dist/${{ matrix.output }}
        run: deno task cli:build:ci

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}

  release-nightly:
    name: Upload Nightly Release
    runs-on: ubuntu-latest
    needs: build-nightly
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find artifacts -type f -exec mv {} release-files/ \;

      - name: Generate checksums
        run: |
          cd release-files
          for file in *; do
            shasum -a 256 "$file" >> checksums-nightly.txt
          done

      - name: Upload to nightly release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly
          name: Nightly Build
          body: |
            **🌙 Nightly development build from main branch**
            
            **Commit**: ${{ github.sha }}
            **Date**: ${{ github.event.head_commit.timestamp }}
            **Author**: ${{ github.event.head_commit.author.name }}
            
            ⚠️ **This is a pre-release build for testing unreleased features.**
            
            These binaries use production API endpoints but contain code from the latest `main` commit.
            For stable releases, see: https://github.com/FeiyouG/monid-client/releases/latest
            
            **Install:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/FeiyouG/monid-client/main/install-nightly.sh | bash
            ```
            
            **Verify checksums:**
            Download `checksums-nightly.txt` and run:
            ```bash
            shasum -a 256 -c checksums-nightly.txt
            ```
          files: release-files/*
          prerelease: true
          draft: false

  build-release:
    name: Build Release (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    needs: test
    if: github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v')
    environment: production
    strategy:
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            output: monid-linux-x64
          - platform: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            output: monid-macos-arm64
          - platform: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            output: monid-windows-x64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"
        shell: bash

      - name: Set environment variables
        run: |
          echo "VERSION=${{ steps.version.outputs.version }}" >> $GITHUB_ENV
          echo "OAUTH_DOMAIN=${{ vars.OAUTH_DOMAIN }}" >> $GITHUB_ENV
          echo "OAUTH_CLIENT_ID=${{ vars.OAUTH_CLIENT_ID }}" >> $GITHUB_ENV
          echo "API_ENDPOINT=${{ vars.API_ENDPOINT }}" >> $GITHUB_ENV
          echo "DASHBOARD_URL=${{ vars.DASHBOARD_URL }}" >> $GITHUB_ENV
          echo "OAUTH_REDIRECT_URI=${{ vars.OAUTH_REDIRECT_URI }}" >> $GITHUB_ENV
          echo "OAUTH_SCOPES=${{ vars.OAUTH_SCOPES }}" >> $GITHUB_ENV
          echo "OAUTH_TYPE=${{ vars.OAUTH_TYPE }}" >> $GITHUB_ENV
        shell: bash

      - name: Generate config
        run: deno task config:gen

      - name: Build binary
        shell: bash
        env:
          DENO_TARGET: ${{ matrix.target }}
          DENO_OUTPUT: dist/${{ matrix.output }}
        run: deno task cli:build:ci

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}

  release:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: build-release
    if: github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find artifacts -type f -exec mv {} release-files/ \;

      - name: Generate checksums
        run: |
          cd release-files
          for file in *; do
            shasum -a 256 "$file" >> checksums.txt
          done

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: release-files/*
          generate_release_notes: true
